name: Release

on:
  workflow_run:
    workflows:
      - Depot tests
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute release version
        id: version
        shell: bash
        env:
          RELEASE_NOTES_FILE: dist/RELEASE_NOTES.md
          CHANGELOG_FILE: CHANGELOG.md
        run: |
          mkdir -p dist
          scripts/ci/compute-release-version.sh

      - name: Publish Linux x64 build
        if: ${{ steps.version.outputs.released == 'true' }}
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          publish_dir="dist/publish/linux-x64"
          archive_root="SteamDepotFS-$version-linux-x64"

          dotnet publish src/SteamDepotFs/SteamDepotFs.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:UseAppHost=true \
            -p:Version="$version" \
            -p:AssemblyVersion="$version.0" \
            -p:FileVersion="$version.0" \
            -o "$publish_dir"

          mkdir -p "dist/$archive_root"
          cp -R "$publish_dir"/. "dist/$archive_root/"
          cp README.md "dist/$archive_root/"
          cp CHANGELOG.md "dist/$archive_root/"
          cp LICENSE NOTICE THIRD-PARTY-NOTICES.md "dist/$archive_root/"
          printf '%s\n' "$version" > "dist/$archive_root/VERSION"
          tar -C dist -czf "dist/$archive_root.tar.gz" "$archive_root"
          cp "dist/$archive_root.tar.gz" "dist/SteamDepotFS-linux-x64.tar.gz"

      - name: Commit changelog
        if: ${{ steps.version.outputs.released == 'true' }}
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "CHANGELOG.md already up to date."
          else
            git commit -m "chore(release): update changelog for $tag [skip ci]"
            git push origin HEAD:main
          fi

      - name: Create tag
        if: ${{ steps.version.outputs.released == 'true' }}
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub release
        if: ${{ steps.version.outputs.released == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"
          gh release create "$tag" \
            "dist/SteamDepotFS-$version-linux-x64.tar.gz" \
            "dist/SteamDepotFS-linux-x64.tar.gz" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes-file dist/RELEASE_NOTES.md

      - name: Skip release
        if: ${{ steps.version.outputs.released != 'true' }}
        run: echo "No release-worthy conventional commits since the last tag."
